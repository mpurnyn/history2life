<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — History2Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            gap: 32px;
        }
        h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }
        #sign-in-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            color: #333;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #sign-in-btn:hover { opacity: 0.9; }
        #sign-in-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #sign-in-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
        #logo {
            max-width: 480px;
            width: 100%;
        }
        #error {
            color: #ff5555;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <img id="logo" src="/static/images/excellentadventure.png" alt="History2Life">
    <button id="sign-in-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
    </button>
    <span id="error">Sign-in failed. Please try again.</span>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqKo00rY5bk56KqptRlKrXlThHk0BY_uw",
            authDomain: "history2life-7dd4b.firebaseapp.com",
            projectId: "history2life-7dd4b",
            storageBucket: "history2life-7dd4b.firebasestorage.app",
            messagingSenderId: "608391799717",
            appId: "1:608391799717:web:a21bb14ad313663d11be4c",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('sign-in-btn').addEventListener('click', async () => {
            const btn = document.getElementById('sign-in-btn');
            const error = document.getElementById('error');
            btn.disabled = true;
            error.style.display = 'none';
            try {
                const result = await signInWithPopup(auth, provider);
                const idToken = await result.user.getIdToken();
                const res = await fetch('/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_token: idToken }),
                });
                if (res.ok) {
                    window.location.href = '/conversation';
                } else {
                    throw new Error('Verification failed');
                }
            } catch (e) {
                error.style.display = 'block';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
